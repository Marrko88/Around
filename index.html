<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <script src="index.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="page">
    <div class="container">
        <div class="header">
            <img class="header__logo" src="./img/header_around.svg" alt="Around The U.S">
        </div>
        <div class="profile">
            <div class="profile__main">
                <div class="profile__avatar">
                    <img src="./img/jacques-cousteau.jpg" alt="avatar">
                </div>
                <div class="profile__explorer">
                    <div class="explorer_info">
                        <p class="explorer__name">Jacques Cousteau</p>
                        <div class="explorer__upload" id="change_profile">
                            <img src="./img/EditButton.png" alt="Edit Button">
                        </div>
                    </div>
                    <span class="explorer__stats">Explorer</span>
                </div>
            </div>
            <div class="profile__add-trip">
                <img src="./img/plus.svg" alt="plus">
            </div>
        </div>
        <div class="content">
            <div class="content__trip">
                <div class="trip__img">
                    <img src="./img/yosemite-valley.png" alt="">
                </div>
                <div class="trip__info">
                    <p class="trip__name">Yosemite Valley</p>
                    <img src="./img/heart.svg" alt="likes">
                </div>
            </div>
            <div class="content__trip">
                <div class="trip__img">
                    <img src="./img/lake-louise.png" alt="">
                </div>
                <div class="trip__info">
                    <p class="trip__name">Lake Louise</p>
                    <img src="./img/heart.svg" alt="likes">
                </div>
            </div>
            <div class="content__trip">
                <div class="trip__img">
                    <img src="./img/bald-mountains.png" alt="">
                </div>
                <div class="trip__info">
                    <p class="trip__name">Bald Mountains</p>
                    <img src="./img/heart.svg" alt="likes">
                </div>
            </div>
            <div class="content__trip">
                <div class="trip__img">
                    <img src="./img/latemar.png" alt="">
                </div>
                <div class="trip__info">
                    <p class="trip__name">Latemar</p>
                    <img src="./img/heart.svg" alt="likes">
                </div>
            </div>
            <div class="content__trip">
                <div class="trip__img">
                    <img src="./img/vanoise-national-park.png" alt="">
                </div>
                <div class="trip__info">
                    <p class="trip__name">Vanoise Nationa...</p>
                    <img src="./img/heart.svg" alt="likes">
                </div>
            </div>
            <div class="content__trip">
                <div class="trip__img">
                    <img src="./img/lago-di-braies.png" alt="">
                </div>
                <div class="trip__info">
                    <p class="trip__name">Lago di Braies</p>
                    <img src="./img/heart.svg" alt="likes">
                </div>
            </div>
        </div>
        <div class="footer">
            <span class="footer__cooperate">© 2022 Around The U.S.</span>
        </div>
    </div>
</div>


<div class="modal" hidden>
    <div class="modal__overlay"></div>
    <div class="modal__content">
        <button class="modal__close"></button>
        <form action="" class="modal__form">
            <span class="modal__title">Update profile</span>
            <label class='madal__label'>
                <span>Name</span>
                <input id="name_input" class="modal__input" type="text" placeholder="Mark">
            </label>
            <label class='madal__label' >
                <span>Surname</span>
                <input  id="surname_input" class="modal__input" type="text" placeholder="Kozlov">
            </label>
            <label class='madal__label' >
                <span>Profession</span>
                <input id="profession_input" class="modal__input" type="text" placeholder="Explorer">
            </label>

            <label class="modal__label">
                <span>Avatar</span>
                <input id="avatar_input" class="modal__input" type="text" placeholder="htttps://www.imgur.com/1wsdewes3" required />
            </label>
            <div class="modal__remember">
                <button class="modal__button">Save</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
